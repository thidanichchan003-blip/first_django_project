{% extends 'dashboard/base_admin.html' %}

{% block content %}

<div class="dashboard-card">

<h2 class="mb-4">

Add New User

</h2>

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label>Username</label>

<input
type="text"
name="username"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Email</label>

<input
type="email"
name="email"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Password</label>

<input
type="password"
name="password"
class="form-control"
required>

</div>

<div class="mb-4">

<label>Role</label>

<select
name="role"
class="form-select">

<option value="customer">

Customer

</option>

<option value="consultant">

Consultant

</option>

</select>

</div>

<button class="btn btn-success">

<i class="fas fa-save"></i>

Create User

</button>

<a
href="{% url 'user_list' %}"
class="btn btn-secondary">

Cancel

</a>

</form>

</div>

{% endblock %}
