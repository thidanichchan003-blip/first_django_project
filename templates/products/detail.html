{% extends 'base.html' %}
{% load static %}


{% block content %}

<div class="row">

<div class="col-md-6">

   {% if product.image %}
   <img src="{{ product.image}}"
      class="img-fluid product-image"
      alt="{{ product.name }}">
   {% endif %}

</div>

<div class="col-md-6">

<h2>{{ product.name }}</h2>

<h3>${{ product.price }}</h3>

<p>{{ product.description }}</p>

<p>
Stock:
{{ product.stock }}
</p>

<a class="btn btn-success"
   href="{% url 'add_to_cart' product.id %}">

   Add To Cart

</a>

</div>

</div>

{% endblock %}
