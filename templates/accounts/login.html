{% extends 'base.html' %}
{% load static %}


{% block content %}

<h2>Login</h2>

<form method="POST">

    {% csrf_token %}

    <input class="form-control"
           type="text"
           name="username"
           placeholder="Username">

    <br>

    <input class="form-control"
           type="password"
           name="password"
           placeholder="Password">

    <br>

    <button class="btn btn-success">
        Login
    </button>
    <p class="mt-3">
    Don't have an account?
    <a href="{% url 'register' %}">
        Register here
    </a>
</p>

</form>

{% endblock %}
